name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/devops-app

jobs:
  # ── JOB 1: CI — runs on every push and PR ────────────────
  ci:
    name: "CI — Test, Build, Scan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests
        run: |
          cd app
          pytest test_main.py -v

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE }}:${{ github.sha }} ./app

      # ── SECURITY GATE: Container scan ──────────────────────
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          exit-code: "1"                 # blocks pipeline on HIGH/CRITICAL
          severity: "HIGH,CRITICAL"
          format: "table"

  # ── JOB 2: CD — runs only on push to main ────────────────
  cd:
    name: "CD — Push & Deploy"
    needs: ci                           # only if CI passes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Push image to GitHub Container Registry (free)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # built-in, no config needed

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} ./app
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      # Spin up Kind cluster in the GitHub Actions runner
      - name: Create Kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: devops-showcase

      # Deploy with Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="image_tag=${{ github.sha }}" \
            -var="github_username=${{ github.repository_owner }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      # Verify deployment
      - name: Verify deployment
        run: |
          kubectl wait --for=condition=available deployment/devops-app \
            --timeout=120s
          kubectl get pods
          kubectl get svc

      # Smoke test
      - name: Run smoke test
        run: |
          kubectl port-forward svc/devops-app-svc 8080:80 &
          sleep 5
          curl -f http://localhost:8080/health
          curl -f http://localhost:8080/
          echo "✅ Smoke tests passed"
          